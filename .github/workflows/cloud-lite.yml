name: cloud-lite

# Manual only — never on a schedule. Always suspends DE_PROJECT_WH.
# Requires GitHub Actions secrets (never commit credentials).
on:
  workflow_dispatch:
    inputs:
      run_dbt:
        description: "Run dbt build against Snowflake marts"
        type: boolean
        default: true
      run_load:
        description: "Run COPY INTO gold load (uses credits; needs stage + S3 gold present)"
        type: boolean
        default: false
      check_guardrails_only:
        description: "Only check guardrails + suspend (skip load/dbt)"
        type: boolean
        default: false

concurrency:
  group: cloud-lite
  cancel-in-progress: false

jobs:
  snowflake:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: DE_PROJECT_WH
      SNOWFLAKE_DATABASE: COMMERCESTREAM_DB
      SNOWFLAKE_SCHEMA: MARTS
      DBT_PROFILES_DIR: ${{ github.workspace }}/.ci-dbt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          set -euo pipefail
          for k in SNOWFLAKE_ACCOUNT SNOWFLAKE_USER SNOWFLAKE_PASSWORD SNOWFLAKE_ROLE; do
            if [ -z "${!k}" ]; then
              echo "Missing GitHub secret: $k"
              exit 1
            fi
          done
          echo "Snowflake secrets present (values not printed)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snowflake + dbt tooling
        run: |
          python -m pip install --upgrade pip
          pip install "snowflake-connector-python>=3.6.0,<4" "dbt-core==1.10.9" "dbt-snowflake==1.10.0"

      - name: Write dbt profiles
        run: |
          mkdir -p "$DBT_PROFILES_DIR"
          cat > "$DBT_PROFILES_DIR/profiles.yml" <<EOF
          commercestream:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${SNOWFLAKE_ACCOUNT}"
                user: "${SNOWFLAKE_USER}"
                password: "${SNOWFLAKE_PASSWORD}"
                role: "${SNOWFLAKE_ROLE}"
                database: COMMERCESTREAM_DB
                warehouse: DE_PROJECT_WH
                schema: MARTS
                threads: 1
                client_session_keep_alive: false
          EOF

      - name: Check Snowflake guardrails
        run: python scripts/run_snowflake_sql.py sql/admin/05_check_snowflake_guardrails.sql

      - name: Load curated gold (optional)
        if: ${{ inputs.run_load && !inputs.check_guardrails_only }}
        run: |
          python scripts/run_snowflake_sql.py sql/snowflake/05_load_gold_tables.sql
          python scripts/run_snowflake_sql.py sql/snowflake/07_verify_gold_load.sql

      - name: dbt build
        if: ${{ inputs.run_dbt && !inputs.check_guardrails_only }}
        run: dbt build --project-dir dbt/commercestream --profiles-dir "$DBT_PROFILES_DIR"

      - name: Suspend DE_PROJECT_WH
        if: always()
        run: python scripts/run_snowflake_sql.py --ignore-errors sql/admin/04_suspend_warehouse.sql
